<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roue des Quiz 🎡</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --math:     #FF6B6B;
    --reading:  #4ECDC4;
    --geo:      #FFE66D;
    --surprise: #C084FC;
    --astro:    #60AFFF;
    --animaux:  #6BCB77;
    --arabe:    #F59E0B;
    --bg:       #1a1a2e;
    --card:     #16213e;
    --text:     #f0f0f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Starfield */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 50%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 15%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 90%, rgba(255,255,255,.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 75%, rgba(255,255,255,.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── SCREENS ── */
  .screen {
    display: none;
    position: relative;
    z-index: 1;
    min-height: 100vh;
  }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

  /* ── WHEEL SCREEN ── */
  #wheelScreen { gap: 22px; padding: 24px; }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.8rem, 5vw, 3rem);
    text-align: center;
    background: linear-gradient(135deg, #FF6B6B, #C084FC, #60AFFF, #4ECDC4, #FFE66D);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(192,132,252,0.4));
  }

  .wheel-section { display: flex; flex-direction: column; align-items: center; gap: 18px; }

  .pointer {
    width: 0; height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-top: 36px solid #fff;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
    position: relative;
  }
  .pointer::after {
    content: '';
    position: absolute;
    top: -40px; left: -8px;
    width: 16px; height: 16px;
    background: #fff;
    border-radius: 50%;
  }

  .wheel-wrap {
    position: relative;
    width: min(360px, 88vw);
    height: min(360px, 88vw);
  }

  canvas {
    border-radius: 50%;
    box-shadow:
      0 0 0 6px rgba(255,255,255,0.15),
      0 0 0 12px rgba(255,255,255,0.06),
      0 20px 60px rgba(0,0,0,0.6),
      0 0 80px rgba(96,175,255,0.2);
    cursor: pointer;
    width: 100%; height: 100%;
  }

  .spin-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 70px; height: 70px;
    border-radius: 50%;
    background: #fff;
    border: none;
    font-family: 'Fredoka One', cursive;
    font-size: 0.78rem;
    color: #1a1a2e;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 5;
    line-height: 1.2;
    text-align: center;
    padding: 4px;
  }
  .spin-btn:hover { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 6px 28px rgba(0,0,0,0.6); }
  .spin-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: translate(-50%, -50%); }

  /* Result banner on wheel screen */
  .result-banner {
    min-height: 72px;
    display: flex; align-items: center; justify-content: center;
  }
  .result-card {
    background: var(--card);
    border-radius: 18px;
    padding: 14px 28px;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.2rem, 4vw, 1.7rem);
    border: 2px solid transparent;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    display: flex; align-items: center; gap: 12px;
    flex-direction: column;
  }
  .result-card .rc-top { display: flex; align-items: center; gap: 12px; }
  .result-card .start-quiz-btn {
    margin-top: 6px;
    background: #fff;
    color: #1a1a2e;
    border: none;
    border-radius: 100px;
    padding: 8px 22px;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  }
  .start-quiz-btn:hover { transform: scale(1.06); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.5) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .result-card.math       { border-color: var(--math);    color: var(--math);    box-shadow: 0 0 30px rgba(255,107,107,.3); }
  .result-card.lecture    { border-color: var(--reading); color: var(--reading); box-shadow: 0 0 30px rgba(78,205,196,.3); }
  .result-card.geographie { border-color: var(--geo);     color: var(--geo);     box-shadow: 0 0 30px rgba(255,230,109,.3); }
  .result-card.surprise   { border-color: var(--surprise);color: var(--surprise);box-shadow: 0 0 30px rgba(192,132,252,.3); }
  .result-card.astronomie { border-color: var(--astro);   color: var(--astro);   box-shadow: 0 0 30px rgba(96,175,255,.3); }
  .result-card.animaux    { border-color: var(--animaux); color: var(--animaux); box-shadow: 0 0 30px rgba(107,203,119,.3); }
  .result-card.arabe      { border-color: var(--arabe);   color: var(--arabe);   box-shadow: 0 0 30px rgba(245,158,11,.3); }

  .result-emoji { font-size: 1.8rem; }

  .legend {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 440px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    background: var(--card);
    padding: 5px 12px;
    border-radius: 100px;
    font-size: 0.78rem; font-weight: 700;
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* Confetti */
  .confetti-piece {
    position: fixed; width: 10px; height: 10px; border-radius: 2px;
    top: -20px; animation: fall linear forwards; z-index: 999; pointer-events: none;
  }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

  /* ── QUIZ SCREEN ── */
  #quizScreen {
    padding: 24px;
    gap: 0;
    justify-content: flex-start;
  }

  .quiz-header {
    width: 100%;
    max-width: 620px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    margin-top: 16px;
  }

  .back-btn {
    background: var(--card);
    border: 2px solid rgba(255,255,255,0.15);
    color: #fff;
    border-radius: 50px;
    padding: 8px 18px;
    font-family: 'Fredoka One', cursive;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: background 0.2s, transform 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .back-btn:hover { background: rgba(255,255,255,0.12); transform: scale(1.04); }

  .quiz-cat-badge {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    padding: 8px 20px;
    border-radius: 50px;
    border: 2px solid currentColor;
    display: flex; align-items: center; gap: 8px;
  }

  /* Progress dots */
  .progress-dots {
    display: flex; gap: 8px; margin-bottom: 24px;
  }
  .dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.3s;
  }
  .dot.done  { background: #4ade80; }
  .dot.wrong { background: #f87171; }
  .dot.current { background: #fff; }

  /* Question card */
  .question-card {
    background: var(--card);
    border-radius: 24px;
    padding: 28px 24px;
    max-width: 620px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .question-num {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.5;
    margin-bottom: 10px;
  }

  .question-text {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    line-height: 1.3;
    margin-bottom: 24px;
  }

  .choices {
    display: flex; flex-direction: column; gap: 12px;
  }

  .choice-btn {
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.15);
    color: #fff;
    border-radius: 14px;
    padding: 14px 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    text-align: left;
    transition: background 0.18s, border-color 0.18s, transform 0.12s;
    display: flex; align-items: center; gap: 12px;
  }
  .choice-btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.14);
    transform: translateX(4px);
  }
  .choice-btn:disabled { cursor: not-allowed; }
  .choice-btn.correct {
    background: rgba(74, 222, 128, 0.2);
    border-color: #4ade80;
    color: #4ade80;
  }
  .choice-btn.wrong {
    background: rgba(248, 113, 113, 0.2);
    border-color: #f87171;
    color: #f87171;
  }
  .choice-letter {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
  }

  /* Question image (illustration or image-as-question) */
  .question-image-wrap {
    margin: 0 auto 18px;
    width: 100%;
    aspect-ratio: 4 / 3;
    border-radius: 14px;
    overflow: hidden;
    background: rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
  }
  .question-image-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Image-options grid (2×2) */
  .choices.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .choice-btn.img {
    flex-direction: column;
    align-items: stretch;
    text-align: center;
    padding: 8px;
    gap: 0;
  }
  .choice-btn.img:hover:not(:disabled) {
    background: rgba(255,255,255,0.14);
    transform: translateY(-2px);
  }
  .choice-btn.img .img-wrap {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
    margin-bottom: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .choice-btn.img .img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .choice-btn.img .cap {
    font-size: 0.95rem;
    font-weight: 700;
    padding-bottom: 6px;
  }

  /* Feedback bar */
  .feedback {
    margin-top: 18px;
    padding: 14px 18px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 1rem;
    display: none;
    align-items: center;
    gap: 10px;
  }
  .feedback.show { display: flex; }
  .feedback.correct { background: rgba(74,222,128,0.15); color: #4ade80; }
  .feedback.wrong   { background: rgba(248,113,113,0.15); color: #f87171; }

  /* Next / finish button */
  .next-btn {
    margin-top: 16px;
    display: none;
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    background: #fff;
    color: #1a1a2e;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .next-btn.show { display: block; }
  .next-btn:hover { transform: scale(1.03); box-shadow: 0 6px 24px rgba(0,0,0,0.4); }

  /* ── SCORE SCREEN ── */
  #scoreScreen { gap: 24px; padding: 24px; text-align: center; }

  .score-emoji { font-size: 5rem; animation: bounce 0.6s ease both; }
  @keyframes bounce {
    0%   { transform: scale(0); }
    70%  { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .score-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
  }

  .score-num {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.5rem, 8vw, 4rem);
  }

  .score-sub { opacity: 0.6; font-size: 1rem; }

  .score-actions { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }

  .btn-primary {
    padding: 14px 32px;
    border-radius: 100px;
    border: none;
    font-family: 'Fredoka One', cursive;
    font-size: 1.05rem;
    cursor: pointer;
    background: #fff;
    color: #1a1a2e;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-primary:hover { transform: scale(1.05); box-shadow: 0 6px 24px rgba(0,0,0,0.4); }

  .btn-secondary {
    padding: 14px 32px;
    border-radius: 100px;
    border: 2px solid rgba(255,255,255,0.25);
    font-family: 'Fredoka One', cursive;
    font-size: 1.05rem;
    cursor: pointer;
    background: transparent;
    color: #fff;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }
</style>
</head>
<body>

<!-- ══════════════ WHEEL SCREEN ══════════════ -->
<div id="wheelScreen" class="screen active">
  <h1>🎡 La Roue des Quiz !</h1>

  <div class="wheel-section">
    <div class="pointer"></div>
    <div class="wheel-wrap">
      <canvas id="wheel" width="380" height="380"></canvas>
      <button class="spin-btn" id="spinBtn" onclick="spin()">TOURNE !<br>🎲</button>
    </div>
  </div>

  <div class="result-banner" id="resultArea"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#FF6B6B"></div>Maths</div>
    <div class="legend-item"><div class="legend-dot" style="background:#4ECDC4"></div>Lecture</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FFE66D"></div>Géographie</div>
    <div class="legend-item"><div class="legend-dot" style="background:#60AFFF"></div>Astronomie</div>
    <div class="legend-item"><div class="legend-dot" style="background:#6BCB77"></div>Animaux</div>
    <div class="legend-item"><div class="legend-dot" style="background:#F59E0B"></div>Arabe</div>
    <div class="legend-item"><div class="legend-dot" style="background:#C084FC"></div>⭐ Surprise !</div>
  </div>
</div>

<!-- ══════════════ QUIZ SCREEN ══════════════ -->
<div id="quizScreen" class="screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="goToWheel()">← Roue</button>
    <div class="quiz-cat-badge" id="catBadge"></div>
  </div>

  <div class="progress-dots" id="progressDots"></div>

  <div class="question-card" id="questionCard">
    <div class="question-image-wrap" id="questionImageWrap" style="display:none;"></div>
    <div class="question-num" id="questionNum"></div>
    <div class="question-text" id="questionText"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()"></button>
  </div>
</div>

<!-- ══════════════ SCORE SCREEN ══════════════ -->
<div id="scoreScreen" class="screen">
  <div class="score-emoji" id="scoreEmoji"></div>
  <div class="score-title" id="scoreTitle"></div>
  <div class="score-num" id="scoreNum"></div>
  <div class="score-sub" id="scoreSub"></div>
  <div class="score-actions">
    <button class="btn-primary" onclick="replayCategory()">🔄 Rejouer ce thème</button>
    <button class="btn-secondary" onclick="goToWheel()">🎡 Retour à la roue</button>
  </div>
</div>

<script src="questions.js"></script>
<script>
/* ═══════════════════════════════════════════════
   WHEEL
═══════════════════════════════════════════════ */
const segments = [
  { label: 'Maths',      emoji: '➕', color: '#FF6B6B', dark: '#c0392b', cls: 'math' },
  { label: 'Lecture',    emoji: '📖', color: '#4ECDC4', dark: '#16a085', cls: 'lecture' },
  { label: 'Géographie', emoji: '🌍', color: '#FFE66D', dark: '#b7950b', cls: 'geographie' },
  { label: 'Astronomie', emoji: '🔭', color: '#60AFFF', dark: '#1a5f8a', cls: 'astronomie' },
  { label: 'Animaux',    emoji: '🐾', color: '#6BCB77', dark: '#15803d', cls: 'animaux' },
  { label: 'Arabe',      emoji: '🔤', color: '#F59E0B', dark: '#92400e', cls: 'arabe' },
  { label: 'Surprise !', emoji: '⭐', color: '#C084FC', dark: '#7d3c98', cls: 'surprise' },
];

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const N = segments.length;
const ARC = (2 * Math.PI) / N;
const SIZE = 380;
const CX = SIZE / 2, CY = SIZE / 2, R = SIZE / 2 - 4;

let currentAngle = 0;
let spinning = false;
let currentSeg = null;

function drawWheel(angle) {
  ctx.clearRect(0, 0, SIZE, SIZE);
  for (let i = 0; i < N; i++) {
    const start = angle + i * ARC;
    const end   = start + ARC;
    const seg   = segments[i];

    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, start, end);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.fill();

    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(start + ARC / 2);
    ctx.textAlign = 'right';

    ctx.font = `${SIZE * 0.056}px serif`;
    ctx.fillText(seg.emoji, R - 10, 6);

    ctx.font = `bold ${SIZE * 0.038}px 'Nunito', sans-serif`;
    ctx.fillStyle = seg.dark;
    ctx.fillText(seg.label, R - 42, 6);
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(CX, CY, 34, 0, 2 * Math.PI);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 3;
  ctx.stroke();
}

function getWinner(angle) {
  const normalized = (((-angle - Math.PI / 2) % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  return segments[Math.floor(normalized / ARC) % N];
}

function spin() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('resultArea').innerHTML = '';

  const totalDelta = (5 + Math.random() * 5) * 2 * Math.PI + Math.random() * 2 * Math.PI;
  const duration   = 4000 + Math.random() * 1500;
  const start      = performance.now();
  const startAngle = currentAngle;

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function frame(now) {
    const t = Math.min((now - start) / duration, 1);
    currentAngle = startAngle + totalDelta * easeOut(t);
    drawWheel(currentAngle);
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      document.getElementById('spinBtn').disabled = false;
      currentSeg = getWinner(currentAngle);
      showWheelResult(currentSeg);
    }
  }
  requestAnimationFrame(frame);
}

// Click directly on a slice to select it (skips the spin animation)
canvas.addEventListener('click', (e) => {
  if (spinning) return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width  / rect.width);
  const y = (e.clientY - rect.top)  * (canvas.height / rect.height);
  const dx = x - CX, dy = y - CY;
  const dist = Math.hypot(dx, dy);
  // Outside wheel rim or inside the central hub (where the spin button sits) → ignore
  if (dist > R || dist < 36) return;
  const clickAngle = Math.atan2(dy, dx);
  const normalized = (((clickAngle - currentAngle) % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  const idx = Math.floor(normalized / ARC) % N;
  currentSeg = segments[idx];
  showWheelResult(currentSeg);
});

function showWheelResult(seg) {
  document.getElementById('resultArea').innerHTML = `
    <div class="result-card ${seg.cls}">
      <div class="rc-top">
        <span class="result-emoji">${seg.emoji}</span>
        <span>${seg.label} !</span>
      </div>
      <button class="start-quiz-btn" onclick="startQuiz()">Jouer ce thème →</button>
    </div>`;
  launchConfetti(seg.color);
}

function launchConfetti(color) {
  const colors = [color, '#fff', '#FFE66D', '#4ECDC4', '#FF6B6B', '#C084FC', '#60AFFF'];
  for (let i = 0; i < 70; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    el.style.animationDelay = (Math.random() * 0.5) + 's';
    const s = (8 + Math.random() * 8) + 'px';
    el.style.width = el.style.height = s;
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

/* ═══════════════════════════════════════════════
   QUIZ LOGIC
═══════════════════════════════════════════════ */
let quizQuestions = [];
let quizIndex = 0;
let score = 0;
let answered = false;

function startQuiz() {
  if (!currentSeg) return;
  const pool = (window.QUIZ_DATA && window.QUIZ_DATA[currentSeg.cls]) || [];
  quizQuestions = shuffle([...pool]);
  quizIndex = 0;
  score = 0;

  // Badge
  const badge = document.getElementById('catBadge');
  badge.textContent = `${currentSeg.emoji} ${currentSeg.label}`;
  badge.className = 'quiz-cat-badge ' + currentSeg.cls;
  // Badge color using segment accent
  badge.style.color = currentSeg.color;
  badge.style.borderColor = currentSeg.color;

  showScreen('quizScreen');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = quizQuestions[quizIndex];
  const total = quizQuestions.length;
  const letters = ['A', 'B', 'C', 'D'];

  document.getElementById('questionNum').textContent = `Question ${quizIndex + 1} sur ${total}`;
  document.getElementById('questionText').textContent = q.question;

  // Question image (optional — illustration or image-as-question)
  const imgWrap = document.getElementById('questionImageWrap');
  if (q.image) {
    imgWrap.innerHTML = `<img src="${q.image}" alt="" onerror="this.parentElement.style.display='none'">`;
    imgWrap.style.display = '';
  } else {
    imgWrap.innerHTML = '';
    imgWrap.style.display = 'none';
  }

  // Progress dots
  const dots = document.getElementById('progressDots');
  dots.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < quizIndex ? ' done' : i === quizIndex ? ' current' : '');
    dots.appendChild(d);
  }

  // Choices — image grid if optionImages set, otherwise text buttons
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  if (q.optionImages) {
    choicesEl.classList.add('grid');
    q.optionImages.forEach((src, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn img';
      btn.innerHTML =
        `<div class="img-wrap"><img src="${src}" alt="${q.options[i]}" onerror="this.style.display='none'"></div>` +
        `<span class="cap">${q.options[i]}</span>`;
      btn.onclick = () => selectAnswer(i);
      choicesEl.appendChild(btn);
    });
  } else {
    choicesEl.classList.remove('grid');
    q.options.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = `<span class="choice-letter">${letters[i]}</span>${c}`;
      btn.onclick = () => selectAnswer(i);
      choicesEl.appendChild(btn);
    });
  }

  // Reset feedback & next
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';

  const nb = document.getElementById('nextBtn');
  nb.className = 'next-btn';
  nb.textContent = quizIndex < total - 1 ? 'Question suivante →' : 'Voir mon score 🏆';

  // Animate card
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = '';
}

function selectAnswer(chosen) {
  if (answered) return;
  answered = true;
  const q = quizQuestions[quizIndex];
  const correctIdx = q.options.indexOf(q.answer);
  const btns = document.querySelectorAll('.choice-btn');

  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correctIdx) btn.classList.add('correct');
    else if (i === chosen) btn.classList.add('wrong');
  });

  const isCorrect = chosen === correctIdx;
  if (isCorrect) score++;

  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
  fb.textContent = isCorrect ? '✅ Bravo, c\'est la bonne réponse !' : `❌ La bonne réponse était : ${q.answer}`;

  // Update current dot
  const dots = document.getElementById('progressDots');
  dots.children[quizIndex].className = 'dot ' + (isCorrect ? 'done' : 'wrong');

  // Preload next question's image (if any) — silent on failure
  const next = quizQuestions[quizIndex + 1];
  if (next && next.image) new Image().src = next.image;

  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  quizIndex++;
  if (quizIndex < quizQuestions.length) {
    renderQuestion();
  } else {
    showScore();
  }
}

function showScore() {
  const total = quizQuestions.length;
  let emoji, title;
  if (score === total)      { emoji = '🏆'; title = 'Parfait ! Bravo !'; }
  else if (score >= total/2){ emoji = '😊'; title = 'Bien joué !'; }
  else                      { emoji = '💪'; title = 'Continue d\'essayer !'; }

  document.getElementById('scoreEmoji').textContent = emoji;
  document.getElementById('scoreTitle').textContent = title;
  document.getElementById('scoreNum').textContent = `${score} / ${total}`;
  document.getElementById('scoreSub').textContent = `en ${currentSeg.label}`;
  document.getElementById('scoreNum').style.color = currentSeg.color;

  showScreen('scoreScreen');
  launchConfetti(currentSeg.color);
}

function replayCategory() {
  startQuiz();
}

/* ═══════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToWheel() {
  showScreen('wheelScreen');
}

/* ═══════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════ */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

drawWheel(0);
